<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAI TTS Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        textarea {
            min-height: 100px;
            font-family: inherit;
            resize: vertical;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .voices {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 8px;
        }
        .voice-btn {
            padding: 8px 12px;
            background: #f0f0f0;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .voice-btn:hover {
            background: #e0e0e0;
            border-color: #667eea;
        }
        .voice-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 OpenAI TTS Test</h1>
        
        <div class="form-group">
            <label>API Key:</label>
            <input type="password" id="apiKey" placeholder="sk-proj-..." />
            <small style="color: #666;">Ваш OpenAI API ключ (не сохраняется)</small>
        </div>

        <div class="form-group">
            <label>Текст для синтеза:</label>
            <textarea id="text" placeholder="Введите текст...">Привет! Это тест синтеза речи OpenAI. Меня зовут Nova, и я говорю по-русски!</textarea>
        </div>

        <div class="form-group">
            <label>Выберите голос:</label>
            <div class="voices">
                <button class="voice-btn" data-voice="alloy">Alloy</button>
                <button class="voice-btn active" data-voice="nova">Nova</button>
                <button class="voice-btn" data-voice="echo">Echo</button>
                <button class="voice-btn" data-voice="fable">Fable</button>
                <button class="voice-btn" data-voice="onyx">Onyx</button>
                <button class="voice-btn" data-voice="shimmer">Shimmer</button>
            </div>
        </div>

        <div class="form-group">
            <label>Модель:</label>
            <select id="model">
                <option value="tts-1" selected>tts-1 (Быстрая, ~300ms)</option>
                <option value="tts-1-hd">tts-1-hd (Высокое качество)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Скорость: <span id="speedValue">1.0</span>x</label>
            <input type="range" id="speed" min="0.25" max="4" step="0.05" value="1.0" 
                   style="width: 100%;" 
                   oninput="document.getElementById('speedValue').textContent = this.value">
        </div>

        <button onclick="testTTS()" id="testBtn">🎤 Синтезировать речь</button>

        <div id="status" class="status"></div>
    </div>

    <script>
        let selectedVoice = 'nova';

        // Выбор голоса
        document.querySelectorAll('.voice-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedVoice = this.dataset.voice;
            });
        });

        async function testTTS() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const text = document.getElementById('text').value.trim();
            const model = document.getElementById('model').value;
            const speed = parseFloat(document.getElementById('speed').value);
            const statusDiv = document.getElementById('status');
            const testBtn = document.getElementById('testBtn');

            // Валидация
            if (!apiKey) {
                showStatus('Пожалуйста, введите API ключ', 'error');
                return;
            }

            if (!text) {
                showStatus('Пожалуйста, введите текст', 'error');
                return;
            }

            if (text.length > 4096) {
                showStatus('Текст не должен превышать 4096 символов', 'error');
                return;
            }

            // Начинаем запрос
            testBtn.disabled = true;
            showStatus('🔄 Отправка запроса в OpenAI...', 'info');

            try {
                const startTime = Date.now();

                const response = await fetch('https://api.openai.com/v1/audio/speech', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: model,
                        input: text,
                        voice: selectedVoice,
                        speed: speed,
                        response_format: 'mp3',
                    }),
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({ error: { message: 'Unknown error' } }));
                    throw new Error(`OpenAI API Error: ${error.error?.message || response.statusText}`);
                }

                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                const audio = new Audio(audioUrl);

                const duration = Date.now() - startTime;

                showStatus(`✅ Успех! Синтез занял ${duration}ms. Воспроизведение...`, 'success');

                audio.addEventListener('ended', () => {
                    URL.revokeObjectURL(audioUrl);
                    showStatus(`✅ Воспроизведение завершено. Голос: ${selectedVoice}, Модель: ${model}, Скорость: ${speed}x`, 'success');
                    testBtn.disabled = false;
                });

                audio.addEventListener('error', (e) => {
                    showStatus('❌ Ошибка воспроизведения аудио', 'error');
                    testBtn.disabled = false;
                });

                await audio.play();

            } catch (error) {
                showStatus(`❌ Ошибка: ${error.message}`, 'error');
                testBtn.disabled = false;
            }
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }

        // Загрузить API ключ из localStorage (если сохранен)
        const savedKey = localStorage.getItem('openai_api_key');
        if (savedKey) {
            document.getElementById('apiKey').value = savedKey;
        }

        // Сохранять ключ при изменении
        document.getElementById('apiKey').addEventListener('change', function() {
            if (this.value.trim()) {
                localStorage.setItem('openai_api_key', this.value.trim());
            }
        });
    </script>
</body>
</html>
